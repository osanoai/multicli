name: Scan

on:
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  shai-hulud-scan:
    name: Shai-Hulud Supply Chain Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Shai-Hulud 2.0 Detector
        uses: gensecaihq/Shai-Hulud-2.0-Detector@85d0ad15eed5c2274e5606949735b59751a0bc61 # v2
        with:
          fail-on-critical: true
          fail-on-high: true
          scan-lockfiles: true
          output-format: text

  codeql-analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: shai-hulud-scan
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: github/codeql-action/init@c793b717bc78562f491db7b0e93a3a178b099162 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@c793b717bc78562f491db7b0e93a3a178b099162 # v4
        with:
          category: "/language:${{ matrix.language }}"
