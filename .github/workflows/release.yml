name: Release & Publish

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: Check if release needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for automated version commit
        id: commit
        run: |
          COMMIT_MSG=$(cat << 'HEREDOC'
          ${{ github.event.head_commit.message }}
          HEREDOC
          )
          if echo "$COMMIT_MSG" | head -1 | grep -q "^chore: version packages"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for publishable changes
        id: files
        if: steps.commit.outputs.skip == 'false'
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            'src/**' \
            'package.json' \
            'package-lock.json' \
            'tsconfig.json' \
            '.changeset/**' \
          )
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Publishable files changed:"
            echo "$CHANGED"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No publishable files changed — skipping release"
          fi

      - name: Decide
        id: decide
        run: |
          if [ "${{ steps.commit.outputs.skip }}" = "true" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          elif [ "${{ steps.files.outputs.has_changes }}" = "true" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  scan:
    name: Security Scan
    needs: check
    if: needs.check.outputs.should_release == 'true'
    uses: ./.github/workflows/scan.yml
    permissions:
      security-events: write
      contents: read
      actions: read

  test:
    name: Tests
    needs: scan
    uses: ./.github/workflows/tests.yml

  release:
    name: Version, Publish & Release
    needs: [check, test]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify npm supports OIDC
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          MAJOR=$(echo "$NPM_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NPM_VERSION" | cut -d. -f2)
          if [ "$MAJOR" -lt 11 ] || ([ "$MAJOR" -eq 11 ] && [ "$MINOR" -lt 5 ]); then
            echo "::error::npm >= 11.5.1 required for OIDC. Found: $NPM_VERSION"
            exit 1
          fi
          echo "npm version $NPM_VERSION supports OIDC trusted publishing."

      - name: Install dependencies
        run: npm ci

      - name: Auto-create patch changeset if none exists
        run: |
          COUNT=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COUNT" = "0" ]; then
            echo "No changesets found — creating automatic patch bump"
            {
              echo '---'
              echo '"@osanoai/multicli": patch'
              echo '---'
              echo ''
              echo 'Automatic patch version bump'
            } > .changeset/auto-ci-patch.md
          fi

      - name: Version packages
        run: npx changeset version

      - name: Check for version change
        id: version
        run: |
          if git diff --quiet package.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No version change detected"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "New version: v$VERSION"
          fi

      - name: Commit and tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version packages v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push --follow-tags

      - name: Rebuild with updated version
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: Publish to npm with provenance
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.version.outputs.version }}`,
              name: `v${{ steps.version.outputs.version }}`,
              generate_release_notes: true,
            });
