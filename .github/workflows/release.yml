name: Release & Publish

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: Check if release needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Check for version change
        id: decide
        run: |
          OLD=$(git show HEAD~1:package.json 2>/dev/null | grep '"version"' | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/' || echo "")
          NEW=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          if [ -n "$OLD" ] && [ "$OLD" != "$NEW" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$NEW" >> $GITHUB_OUTPUT
            echo "Version changed: $OLD -> $NEW"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No version change detected ($NEW)"
          fi

  scan:
    name: Security Scan
    needs: check
    if: needs.check.outputs.should_release == 'true'
    uses: ./.github/workflows/scan.yml
    permissions:
      security-events: write
      contents: read
      actions: read

  test:
    name: Tests
    needs: scan
    uses: ./.github/workflows/tests.yml

  release:
    name: Publish & Release
    needs: [check, test]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js 24
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify npm supports OIDC
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          MAJOR=$(echo "$NPM_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NPM_VERSION" | cut -d. -f2)
          if [ "$MAJOR" -lt 11 ] || ([ "$MAJOR" -eq 11 ] && [ "$MINOR" -lt 5 ]); then
            echo "::error::npm >= 11.5.1 required for OIDC. Found: $NPM_VERSION"
            exit 1
          fi
          echo "npm version $NPM_VERSION supports OIDC trusted publishing."

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check.outputs.version }}"
          git push origin "v${{ needs.check.outputs.version }}"

      - name: Create GitHub Release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ needs.check.outputs.version }}`,
              name: `v${{ needs.check.outputs.version }}`,
              generate_release_notes: true,
            });
