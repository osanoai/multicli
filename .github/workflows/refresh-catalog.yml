name: Refresh Model Catalog

on:
  schedule:
    - cron: '0 9 * * *' # Every day at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    name: Refresh model catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CLIs (no lifecycle scripts to prevent secret exfiltration)
        run: |
          npm install -g --ignore-scripts @anthropic-ai/claude-code @google/gemini-cli @openai/codex
        continue-on-error: true

      - name: Login Codex CLI
        run: echo "$OPENAI_API_KEY" | codex login --with-api-key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Refresh catalog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/refresh-catalog.ts

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/modelCatalog.generated.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No model catalog changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Model catalog has changed"
          fi

      - name: Generate app token
        if: steps.diff.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Open PR with catalog update
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use app token for push so CI triggers on the PR
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Create branch and commit
          BRANCH="chore/catalog-refresh-$(date +%Y%m%d%H%M)"
          git checkout -b "$BRANCH"
          git add src/modelCatalog.generated.json
          git commit -m "chore: refresh model catalog"
          git push origin "$BRANCH"

          # Open PR and enable auto-merge (merges after required checks pass)
          gh pr create \
            --title "chore: refresh model catalog" \
            --body "Automated nightly catalog refresh. AI model lists have changed." \
            --base main \
            --head "$BRANCH"
          gh pr merge --auto --squash
