name: Refresh Model Catalog

on:
  schedule:
    - cron: '0 9 * * *' # Every day at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    name: Refresh model catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js 24
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CLIs (no lifecycle scripts to prevent secret exfiltration)
        run: |
          npm install -g --ignore-scripts @anthropic-ai/claude-code @google/gemini-cli codex
        continue-on-error: true

      - name: Refresh catalog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/refresh-catalog.ts

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/modelCatalog.generated.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No model catalog changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Model catalog has changed"
          fi

      - name: Create changeset
        if: steps.diff.outputs.changed == 'true'
        run: |
          {
            echo '---'
            echo '"@osanoai/multicli": patch'
            echo '---'
            echo ''
            echo 'Refresh model catalog with latest available models from CLIs'
          } > .changeset/auto-catalog-refresh.md

      - name: Commit to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/modelCatalog.generated.json .changeset/auto-catalog-refresh.md
          git commit -m "chore: refresh model catalog"
          git push
