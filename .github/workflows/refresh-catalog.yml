name: Refresh Model Catalog

on:
  schedule:
    - cron: '0 9 * * *' # Every day at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    name: Refresh model catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CLIs (no lifecycle scripts to prevent secret exfiltration)
        run: |
          npm install -g --ignore-scripts @anthropic-ai/claude-code @google/gemini-cli codex
        continue-on-error: true

      - name: Refresh catalog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/refresh-catalog.ts

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/modelCatalog.generated.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No model catalog changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Model catalog has changed"
          fi

      - name: Open PR with version bump
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Bump patch version in package.json and sync package-lock.json
          npm version patch --no-git-tag-version
          npm install --package-lock-only

          # Create branch and commit
          BRANCH="chore/catalog-refresh-$(date +%Y%m%d%H%M)"
          git checkout -b "$BRANCH"
          git add src/modelCatalog.generated.json package.json package-lock.json
          git commit -m "chore: refresh model catalog"
          git push origin "$BRANCH"

          # Open PR and enable auto-merge (merges after required checks pass)
          gh pr create \
            --title "chore: refresh model catalog" \
            --body "Automated nightly catalog refresh. AI model lists have changed." \
            --base main \
            --head "$BRANCH"
          gh pr merge --auto --squash
