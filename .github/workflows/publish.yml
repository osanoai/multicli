name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  verify-security:
    name: Verify Security Scans Passed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
    steps:
      - name: Verify scan.yml passed for release commit
        uses: actions/github-script@v8
        with:
          script: |
            // Resolve the HEAD commit SHA on main
            const branch = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main'
            });
            const sha = branch.data.commit.sha;
            console.log(`Checking scan workflow for commit: ${sha}`);

            // Find the scan workflow by file path (stable, unlike display name)
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const scanWorkflow = workflows.data.workflows.find(
              w => w.path === '.github/workflows/scan.yml'
            );
            if (!scanWorkflow) {
              core.setFailed('scan.yml workflow not found in this repository.');
              return;
            }

            // Poll for a completed run — handles race condition if scan is still in progress
            const maxAttempts = 10;
            const delayMs = 30000; // 30 seconds between attempts
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: scanWorkflow.id,
                head_sha: sha,
                per_page: 1,
              });

              if (runs.data.total_count > 0) {
                const run = runs.data.workflow_runs[0];
                if (run.status === 'completed') {
                  if (run.conclusion === 'success') {
                    console.log(`Security scan passed (run #${run.run_number}).`);
                    return;
                  } else {
                    core.setFailed(
                      `Security scan failed with conclusion "${run.conclusion}". ` +
                      `Fix security issues before publishing.`
                    );
                    return;
                  }
                }
                console.log(
                  `Scan still running (attempt ${attempt}/${maxAttempts}, ` +
                  `status: ${run.status})... waiting ${delayMs / 1000}s`
                );
              } else {
                console.log(
                  `No scan run found for SHA ${sha.slice(0, 7)} ` +
                  `(attempt ${attempt}/${maxAttempts})... waiting ${delayMs / 1000}s`
                );
              }

              if (attempt < maxAttempts) {
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            core.setFailed(
              'Security scan did not complete within the timeout window. ' +
              'Push to main and wait for scan.yml to pass before creating a release.'
            );

  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    needs: verify-security
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (type-check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [verify-security, test]
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify npm supports OIDC
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          MAJOR=$(echo "$NPM_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NPM_VERSION" | cut -d. -f2)
          if [ "$MAJOR" -lt 11 ] || ([ "$MAJOR" -eq 11 ] && [ "$MINOR" -lt 5 ]); then
            echo "::error::npm >= 11.5.1 required for OIDC trusted publishing. Found: $NPM_VERSION"
            exit 1
          fi
          echo "npm version $NPM_VERSION supports OIDC trusted publishing."

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify version matches release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PACKAGE_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PACKAGE_VERSION"

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
